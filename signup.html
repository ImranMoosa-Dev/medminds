<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>MedMinds | Sign Up</title>
    <link rel="stylesheet" href="style.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <style>
      :root {
        --bg-primary: #ffffff;
        --bg-secondary: #f5f5f5;
        --text-primary: #1a1a1a;
        --text-secondary: #666666;
        --border-color: #e0e0e0;
        --gradient-start: #0b63b7;
        --gradient-end: #0a4a8f;
        --accent-red: #ff6b6b;
      }

      [data-theme="dark"] {
        --bg-primary: #1a1a1a;
        --bg-secondary: #2d2d2d;
        --text-primary: #ffffff;
        --text-secondary: #cccccc;
        --border-color: #404040;
        --gradient-start: #0b63b7;
        --gradient-end: #0a4a8f;
        --accent-red: #ff8888;
      }

      * {
        color-scheme: light dark;
      }

      body {
        background-color: var(--bg-secondary);
        color: var(--text-primary);
        transition:
          background-color 0.3s,
          color 0.3s;
      }

      .login-wrapper {
        background-color: var(--bg-secondary);
      }

      .login-card {
        background-color: var(--bg-primary);
        border: 1px solid var(--border-color);
      }

      .form-group input,
      .form-group textarea,
      .form-group select {
        background-color: var(--bg-secondary);
        color: var(--text-primary);
        border-color: var(--border-color);
      }

      .form-group input::placeholder,
      .form-group textarea::placeholder {
        color: var(--text-secondary);
      }

      .alert {
        padding: 12px 15px;
        border-radius: 6px;
        margin-bottom: 15px;
        font-size: 13px;
        display: none;
        animation: slideDown 0.3s;
      }

      @keyframes slideDown {
        from {
          transform: translateY(-10px);
          opacity: 0;
        }
        to {
          transform: translateY(0);
          opacity: 1;
        }
      }

      .alert.show {
        display: block;
      }

      .alert.success {
        background-color: #d4edda;
        color: #155724;
        border-left: 4px solid #28a745;
      }

      .alert.error {
        background-color: #f8d7da;
        color: #721c24;
        border-left: 4px solid #f5222d;
      }

      [data-theme="dark"] .alert.success {
        background-color: #1e4620;
        color: #90ee90;
      }

      [data-theme="dark"] .alert.error {
        background-color: #4a1a1a;
        color: #ff9999;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      .back-link {
        text-align: center;
        margin-top: 15px;
        font-size: 13px;
        color: var(--text-secondary);
      }

      .back-link a {
        background: none;
        border: none;
        color: var(--gradient-start);
        cursor: pointer;
        font-weight: 600;
        text-decoration: none;
      }

      .back-link a:hover {
        text-decoration: underline;
      }
    </style>

    <script>
      // Theme initialization
      function initTheme() {
        const savedTheme = localStorage.getItem("medminds-theme");
        let theme = "system";

        if (savedTheme) {
          theme = savedTheme;
        } else if (
          window.matchMedia &&
          window.matchMedia("(prefers-color-scheme: dark)").matches
        ) {
          theme = "dark";
        } else {
          theme = "light";
        }

        applyTheme(theme);
      }

      function applyTheme(theme) {
        if (theme === "system") {
          const prefersDark = window.matchMedia(
            "(prefers-color-scheme: dark)",
          ).matches;
          document.documentElement.setAttribute(
            "data-theme",
            prefersDark ? "dark" : "light",
          );
        } else {
          document.documentElement.setAttribute("data-theme", theme);
        }
        localStorage.setItem("medminds-theme", theme);
      }

      // Initialize theme on page load
      window.addEventListener("DOMContentLoaded", () => {
        initTheme();
      });

      // If already logged in, redirect
      (async function () {
        const _url = "https://lnwzalpnyawhbiuunxoo.supabase.co";
        const _key =
          "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imxud3phbHBueWF3aGJpdXVueG9vIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgwNTkxNTMsImV4cCI6MjA5MzYzNTE1M30.cxScci7MZ7Hq-za6AF4gDcOOtjkZhbMU7LI7aPD724o";
        const _client = supabase.createClient(_url, _key);

        try {
          const { data } = await _client.auth.getUser();
          if (data.user) {
            const adminEmails = [
              "admin@medminds.com",
              "service.medminds@gmail.com",
            ];
            if (adminEmails.includes(data.user.email)) {
              window.location.href = "admin.html";
            } else {
              window.location.href = "quiz-selection.html";
            }
          }
        } catch (e) {
          console.error("Auth check error:", e);
        }
      })();
    </script>
  </head>
  <body class="login-body">
    <main class="login-wrapper">
      <section class="login-card" aria-labelledby="brand">
        <div class="brand-container">
          <img
            src="WhatsApp Image 2026-01-06 at 10.22.40 AM (1).jpeg"
            alt="MedMinds Logo"
            class="logo"
          />
          <div class="brand-text">
            <h1 id="brand">MedMinds</h1>
            <p>Create your account</p>
          </div>
        </div>

        <div id="formAlert" class="alert"></div>

        <!-- Sign Up Form -->
        <form
          id="signupForm"
          onsubmit="
            event.preventDefault();
            signup();
          "
        >
          <div class="form-group">
            <label for="signupFirstName">First Name</label>
            <input
              type="text"
              id="signupFirstName"
              placeholder="John"
              required
            />
          </div>

          <div class="form-group">
            <label for="signupLastName">Last Name</label>
            <input type="text" id="signupLastName" placeholder="Doe" required />
          </div>

          <div class="form-group">
            <label for="signupEmail">Email</label>
            <input
              type="email"
              id="signupEmail"
              placeholder="name@medical.com"
              required
            />
          </div>

          <div class="form-group">
            <label for="signupPhone">Phone Number</label>
            <input type="tel" id="signupPhone" placeholder="+92 98765 43210" />
          </div>

          <div class="form-group">
            <label for="signupPassword">Password</label>
            <input
              type="password"
              id="signupPassword"
              placeholder="••••••••"
              required
            />
          </div>

          <div class="form-group">
            <label for="signupConfirmPassword">Confirm Password</label>
            <input
              type="password"
              id="signupConfirmPassword"
              placeholder="••••••••"
              required
            />
          </div>

          <div class="action-buttons">
            <button type="submit" class="btn btn-primary">
              Create Account
            </button>
          </div>
        </form>

        <div class="back-link">
          Already have an account? <a href="index.html">Sign In</a>
        </div>

        <div class="divider">
          <span class="secure-badge">
            <svg
              width="14"
              height="14"
              viewBox="0 0 24 24"
              fill="currentColor"
              aria-hidden="true"
            >
              <path
                d="M12 2L4 5v6.09c0 5.05 3.41 9.76 8 10.91 4.59-1.15 8-5.86 8-10.91V5l-8-3zm0 2.18l6 2.25v4.66c0 3.99-2.53 7.74-6 8.71-3.47-.97-6-4.72-6-8.71V6.43l6-2.25z"
              />
            </svg>
            Secure Medical Assessment Portal
          </span>
        </div>
      </section>
    </main>

    <script src="script.js"></script>
    <script>
      // NOTE: supabaseClient, SUPABASE_URL, SUPABASE_KEY are defined in script.js — do NOT redeclare here

      function showAlert(message, type = "error") {
        const alert = document.getElementById("formAlert");
        alert.textContent = message;
        alert.className = `alert ${type} show`;
        setTimeout(() => alert.classList.remove("show"), 5000);
      }

      async function signup() {
        const firstName = document
          .getElementById("signupFirstName")
          .value.trim();
        const lastName = document.getElementById("signupLastName").value.trim();
        const email = document.getElementById("signupEmail").value.trim();
        const phone = document.getElementById("signupPhone").value.trim();
        const password = document.getElementById("signupPassword").value;
        const confirmPassword = document.getElementById(
          "signupConfirmPassword",
        ).value;

        // Validation
        if (!firstName)
          return showAlert("Please enter your first name", "error");
        if (!lastName) return showAlert("Please enter your last name", "error");
        if (!email) return showAlert("Please enter your email", "error");
        if (!password) return showAlert("Please enter a password", "error");
        if (password.length < 6)
          return showAlert("Password must be at least 6 characters", "error");
        if (password !== confirmPassword)
          return showAlert("Passwords do not match", "error");

        try {
          // Disable button and show loading state
          const submitBtn = document.querySelector(".btn-primary");
          const originalText = submitBtn.innerHTML;
          submitBtn.disabled = true;
          submitBtn.innerHTML =
            '<span style="display: inline-block; width: 14px; height: 14px; border: 2px solid #fff; border-top: 2px solid transparent; border-radius: 50%; animation: spin 0.8s linear infinite; margin-right: 8px;"></span>Creating...';

          // Sign up with Supabase Auth
          // NOTE: We do NOT insert into the users table here.
          // A Supabase database trigger (on_auth_user_confirmed) handles that
          // automatically once the user confirms their email, using raw_user_meta_data.
          const { data: authData, error: authError } =
            await supabaseClient.auth.signUp({
              email,
              password,
              options: {
                emailRedirectTo: "http://127.0.0.1:5502/quiz-selection.html",
                data: {
                  first_name: firstName,
                  last_name: lastName,
                  phone: phone || null,
                },
              },
            });

          if (authError) {
            if (
              authError.message.toLowerCase().includes("already registered")
            ) {
              throw new Error(
                "This email is already registered. Please sign in instead.",
              );
            }
            throw new Error(authError.message);
          }

          if (!authData.user)
            throw new Error("User creation failed. Please try again.");

          showAlert(
            "✅ Account created! Check your email to confirm.",
            "success",
          );

          setTimeout(() => {
            window.location.href = `account-confirmation.html?email=${encodeURIComponent(email)}`;
          }, 1500);
        } catch (e) {
          console.error("Signup error:", e);
          showAlert(e.message || "Failed to create account", "error");

          // Re-enable button on error
          const submitBtn = document.querySelector(".btn-primary");
          submitBtn.disabled = false;
          submitBtn.innerHTML = "Create Account";
        }
      }
    </script>
  </body>
</html>
