<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Question Bank - MedMinds MDCAT</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="global.css">
<style>

* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text-main);
    line-height: 1.7;
}

 header {
     position: sticky;
     top: 0;
     z-index: 1000;
     background: rgba(255,255,255,0.95);
     backdrop-filter: blur(14px);
     padding: 18px 50px;
     display: flex;
     justify-content: space-between;
     align-items: center;
     border-bottom: 1px solid rgba(0,0,0,0.08);
     position: relative; 
 }

 .logo-text {
     display: flex;
     align-items: center;
     gap: 15px;
     position: absolute; 
     left: 50px;
     top: 50%;
     transform: translateY(-50%);
 }

 .logo-text h1 {
     font-size: clamp(1.6rem, 5vw, 1.8rem);
     font-weight: 800;
     background: linear-gradient(135deg, var(--blue-main), var(--blue-dark));
     -webkit-background-clip: text;  
     -webkit-text-fill-color: transparent;
     background-clip: text;
     color: transparent;
 }

 .logo-text p {
     font-size: 0.75rem;
     color: var(--text-muted);
 }


 header nav {
     margin-left: 280px; 
 }

 header nav ul {
     list-style: none;
     display: flex;
     gap: 28px;
 }

header nav a {
    text-decoration: none;
    color: var(--text-main);
    font-weight: 600;
    padding: 10px 22px;
    border-radius: 999px;
    transition: all 0.35s ease;
}

header nav a:hover {
    background: linear-gradient(135deg, var(--blue-main), var(--blue-dark));
    color: white;
    box-shadow: var(--shadow-hover);
}


.hamburger {
    display: none;
    flex-direction: column;
    cursor: pointer;
    padding: 5px;
}

.hamburger div {
    width: 25px;
    height: 3px;
    background-color: var(--blue-dark);
    margin: 4px 0;
    transition: 0.3s;
}

.hamburger.active div:nth-child(1) {
    transform: rotate(-45deg) translate(-5px, 6px);
}

.hamburger.active div:nth-child(2) {
    opacity: 0;
}

.hamburger.active div:nth-child(3) {
    transform: rotate(45deg) translate(-5px, -6px);
}


.section {
    max-width: 1200px;
    margin: 90px auto;
    padding: 50px;
    background: linear-gradient(145deg, white, var(--blue-soft));
    border-radius: var(--radius);
    box-shadow: var(--shadow-soft);
}

footer {
    background: linear-gradient(135deg, var(--blue-dark), var(--blue-main));
    color: white;
    text-align: center;
    padding: 35px 20px;
}

footer a {
    color: white;
    text-decoration: none;
}


@media (max-width: 768px) {
    header {
        padding: 20px;
        flex-direction: column;
        gap: 15px;
    }

    .logo-text {
        position: static;
        transform: none;
        justify-content: center;
        margin-bottom: 10px;
    }

    header nav {
        margin-left: 0;
        display: none;
        width: 100%;
    }

    header nav.show {
        display: block;
    }

    header nav ul {
        flex-direction: column;
        align-items: center;
    }

    .section {
        padding: 30px 20px;
    }
}
</style>
</head>
<body>
<header>
    <div class="logo-text">
        <div>
            <h1>MedMinds MDCAT</h1>
            <p>Your future begins here</p>
        </div>
    </div>

    <nav>
        <ul>
            <li><a href="home.html"><i class="fas fa-home"></i> Home</a></li>
            <li><a href="statics.html"><i class="fas fa-chart-bar"></i> Statistics</a></li>
            <li><a href="quiz.html"><i class="fas fa-brain"></i> Quiz</a></li>
            <li><a href="Q-Bank.html"><i class="fas fa-book"></i> Q-Bank</a></li>
            <li><a href="student-notes.html"><i class="fas fa-file-alt"></i> Notes</a></li>
            <li><a href="MistakeCorner.html"><i class="fas fa-exclamation-triangle"></i> Mistake Corner</a></li>
            <li><a href="#" onclick="confirmLogout()"><i class="fas fa-sign-out-alt"></i> Logout</a></li>
        </ul>
    </nav>

    <div class="hamburger" onclick="toggleNav()">
        <div></div>
        <div></div>
        <div></div>
    </div>
</header>

    <section class="section q-bank">
        <h2>Question Bank</h2>
        <div class="filters">
            <label>Subject: <select id="subject-filter"><option value="">All</option></select></label>
            <label>Chapter: <input type="text" id="chapter-filter" placeholder="Chapter"></label>
            <label>Test Type: <select id="testtype-filter"><option value="">All</option></select></label>
            <button onclick="applyFilters()">Filter</button>
            <button onclick="clearFilters()">Clear</button>
        </div>
        <div id="q-bank-content">
            <!-- Subjects and questions will be inserted here -->
        </div>
    </section>

    <!-- Question Modal -->
    <div id="question-modal" onclick="closeModal()" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); backdrop-filter: blur(10px); z-index: 1000; display: flex; justify-content: center; align-items: center;">
        <div onclick="event.stopPropagation()" class="modal-box">
         <button onclick="closeModal()">&times;</button>
            <div id="question-content">
                <!-- Question content will be inserted here -->
            </div>
        </div>
    </div>

    <footer>
        <p>&copy; 2025 MedMinds MDCAT.</p>
        <p>
            <i class="fas fa-envelope"></i>
            <a href="mailto:admin@medminds.com">admin@medminds.com</a> |
            <i class="fab fa-whatsapp"></i>
            <a href="https://whatsapp.com/channel/0029VbAO9hc7IUYXO5QyIu1E" target="_blank">MedMinds MDCAT Test Session</a> |
            <i class="fab fa-instagram"></i>
            <a href="https://www.instagram.com/medminds_mdcat/" target="_blank">MedMinds MDCAT</a>
        </p>
    </footer>

    <script>
        function confirmLogout() {
            if (confirm('Are you sure you want to logout?')) {
                window.location.href = '/logout';
            }
        }
        function toggleNav() {
            document.querySelector('header nav').classList.toggle('show');
            document.querySelector('.hamburger').classList.toggle('active');
        }

        let currentQuestion = null;
        let filters = {};

        async function loadQBank() {
            try {
                const response = await fetch('/api/q-bank');
                const data = await response.json();
                // Populate filters
                const subjects = Object.keys(data.subjects);
                const subjectSelect = document.getElementById('subject-filter');
                subjectSelect.innerHTML = '<option value="">All</option>' + subjects.map(s => `<option value="${s}">${s}</option>`).join('');
                const allQuestions = Object.values(data.subjects).flat();
                const testTypes = [...new Set(allQuestions.map(q => q.testName))];
                const testTypeSelect = document.getElementById('testtype-filter');
                testTypeSelect.innerHTML = '<option value="">All</option>' + testTypes.map(t => `<option value="${t}">${t}</option>`).join('');
                displayQBank(data, filters);
            } catch (error) {
                console.error('Error loading Q-Bank:', error);
                document.getElementById('q-bank-content').innerHTML = '<p>Error loading questions.</p>';
            }
        }

        function displayQBank(data, filters = {}) {
            const content = document.getElementById('q-bank-content');
            let allQuestions = [];
            for (const [subject, questions] of Object.entries(data.subjects)) {
                questions.forEach(q => allQuestions.push({ ...q, subject }));
            }
            // Apply filters
            if (filters.subject) allQuestions = allQuestions.filter(q => q.subject === filters.subject);
            if (filters.chapter) allQuestions = allQuestions.filter(q => q.chapter && q.chapter.toLowerCase().includes(filters.chapter.toLowerCase()));
            if (filters.testType) allQuestions = allQuestions.filter(q => q.testName === filters.testType);
            // Group back
            const grouped = {};
            allQuestions.forEach(q => {
                if (!grouped[q.subject]) grouped[q.subject] = [];
                grouped[q.subject].push(q);
            });
            let html = '';
            for (const [subject, questions] of Object.entries(grouped)) {
                html += `<h3>${subject}</h3>`;
                html += '<ul class="questions-list">';
                questions.forEach(q => {
                    const statusClass = q.status === 'correct' ? 'correct' : q.status === 'wrong' ? 'wrong' : 'unattempted';
                    html += `<li class="${statusClass}" onclick="showQuestion(${q.id})">${q.question}</li>`;
                });
                html += '</ul>';
            }
            content.innerHTML = html;
        }

        async function showQuestion(id) {
            try {
                const response = await fetch('/api/q-bank');
                const data = await response.json();
                let question = null;
                for (const questions of Object.values(data.subjects)) {
                    question = questions.find(q => q.id === id);
                    if (question) break;
                }
                if (!question) return;

                currentQuestion = question;
                let html = '<div class="question-scroll">';
                html += `<h3>${question.question}</h3>`;
                if (question.image) {
                    html += `<img src="/uploads/${question.image}" alt="Question image" style="max-width: 100%;"><br>`;
                }
                html += '<form id="answer-form">';
                html += '<div class="options-grid">';
                for (let i = 1; i <= 4; i++) {
                    html += `<input id="opt${i}" type="radio" name="answer" value="${i}"><label for="opt${i}">${question['opt' + i]}</label>`;
                }
                html += '</div>';
                html += '</form>';
                html += '</div>';
                html += '<button type="submit" form="answer-form" class="submit-btn">Submit Answer</button>';
                document.getElementById('question-content').innerHTML = html;
                document.getElementById('question-modal').style.display = 'flex';

                document.getElementById('answer-form').addEventListener('submit', submitAnswer);
            } catch (error) {
                console.error('Error loading question:', error);
            }
        }

        async function submitAnswer(e) {
            e.preventDefault();
            const formData = new FormData(e.target);
            const answer = formData.get('answer');
            if (!answer) {
                alert('Please select an answer.');
                return;
            }
            try {
                const response = await fetch('/submit-answer', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ questionId: currentQuestion.id, answer: parseInt(answer) })
                });
                const result = await response.json();
                if (result.success) {
                    let html = `<h3>${currentQuestion.question}</h3>`;
                    if (currentQuestion.image) {
                        html += `<img src="/uploads/${currentQuestion.image}" alt="Question image" style="max-width: 100%;"><br>`;
                    }
                    for (let i = 1; i <= 4; i++) {
                        const isCorrect = i === result.correctAnswer + 1;
                        const isUserAnswer = i === parseInt(answer);
                        let className = '';
                        if (isCorrect) className = 'correct';
                        else if (isUserAnswer) className = 'wrong';
                        html += `<p class="${className}">${String.fromCharCode(64 + i)}. ${currentQuestion['opt' + i]}</p>`;
                    }
                    html += `<p><strong>Explanation:</strong> ${result.explanation}</p>`;
                    html += '<button onclick="closeModal()">Close</button>';
                    document.getElementById('question-content').innerHTML = html;
                    // Reload Q-Bank to update status
                    loadQBank();
                } else {
                    alert(result.message);
                }
            } catch (error) {
                console.error('Error submitting answer:', error);
            }
        }

        function applyFilters() {
            filters.subject = document.getElementById('subject-filter').value;
            filters.chapter = document.getElementById('chapter-filter').value;
            filters.testType = document.getElementById('testtype-filter').value;
            loadQBank();
        }

        function clearFilters() {
            document.getElementById('subject-filter').value = '';
            document.getElementById('chapter-filter').value = '';
            document.getElementById('testtype-filter').value = '';
            filters = {};
            loadQBank();
        }

        function closeModal() {
            document.getElementById('question-modal').style.display = 'none';
        }

        loadQBank();
    </script>

    <style>
        .questions-list {
            list-style: disc;
            padding-left: 20px;
            display: block;
        }
        .questions-list li {
            display: list-item;
            width: 100%;
            margin-bottom: 10px;
            padding: 10px;
            border-radius: var(--radius);
            cursor: pointer;
            transition: all 0.3s ease;
            border: 1px solid var(--blue-soft);
            background: white;
        }
        .questions-list li:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow-hover);
            border-color: var(--blue-main);
        }
        .unattempted {
            background: #f9fafb;
        }
        .correct {
            background: #d1fae5;
            border-color: #10b981;
        }
        .wrong {
            background: #fee2e2;
            border-color: #ef4444;
        }
        .correct {
            color: #065f46;
        }
        .wrong {
            color: #991b1b;
        }
        #question-modal div {
            background: white;
            border-radius: var(--radius);
            box-shadow: var(--shadow-soft);
        }
        #question-modal form {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        #question-modal button {
            background: var(--blue-main);
            color: white;
            border: none;
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 10px;
        }
        #question-modal button:hover {
            background: var(--blue-dark);
        }
        .filters {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .filters label {
            display: flex;
            flex-direction: column;
            font-weight: 600;
        }
        .filters select, .filters input {
            padding: 8px;
            border: 1px solid var(--blue-soft);
            border-radius: 4px;
            margin-top: 5px;
        }
        .filters button {
            background: var(--blue-main);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            margin-top: 20px;
        }
        .filters button:hover {
            background: var(--blue-dark);
        }
        h3 {
            margin-top: 30px;
            color: var(--blue-dark);
        }
        #question-modal h3 {
            color: var(--blue-dark);
            margin-bottom: 20px;
            font-size: 1.5em;
        }
        #question-modal .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        
        /* Make modal content a flex container */
#question-modal > div {
    display: flex;
    flex-direction: column;
}
.modal-box {
    background: linear-gradient(180deg, white, var(--blue-soft));
    padding: 40px;
    border-radius: var(--radius);
    max-width: 800px;
    width: 95%;
    max-height: 90%;
    position: relative;
    box-shadow: var(--shadow-soft);
}

/* Allow question content to scroll */
#question-content {
    flex: 1;
    overflow-y: auto;
    padding-bottom: 80px; /* space for submit button */
}

.submit-btn {
    position: sticky;
    bottom: 20px;
    align-self: center;
    width: 90%;
    max-width: 400px;
    flex-shrink: 0;
    margin-top: auto;  
    align-self: flex-end; 
    box-shadow: none;
}

        #question-modal label {
            display: block;
            background: var(--blue-soft);
            padding: 15px 20px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 1em;
            font-weight: 500;
            color: var(--text-main);
            border: 2px solid transparent;
            text-align: left;
        }
        #question-modal label:hover {
            background: white;
            border-color: var(--blue-main);
            transform: translateY(-2px);
            box-shadow: var(--shadow-soft);
        }
        #question-modal input[type="radio"] {
            display: none;
        }
        #question-modal input[type="radio"]:checked + label {
            background: var(--blue-main);
            color: white;
            border-color: var(--blue-main);
            box-shadow: var(--shadow-hover);
        }
        @media (max-width: 768px) {
            #question-modal .options-grid {
                grid-template-columns: 1fr;
            }
        }
        #question-modal button {
            position: absolute;
            top: 15px;
            right: 20px;
            background: none;
            border: none;
            font-size: 24px;
            color: var(--text-muted);
            cursor: pointer;
            padding: 0;
            transition: all 0.3s ease;
        }
        #question-modal button:hover {
            background: rgba(0,0,0,0.1);
            border-radius: 50%;
            padding: 5px;
        }
        #question-content {
            display: flex;
            flex-direction: column;
            height: 100%;
        }
        .question-scroll {
            flex: 1;
            overflow-y: auto;
            padding-bottom: 10px;
        }
      
    </style>
</body>
</html>
