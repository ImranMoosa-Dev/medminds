<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Batch – MedMinds</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@400;700;900&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --blue-dark:  #072f6b;
      --blue-mid:   #0a4a8f;
      --blue-main:  #0b63b7;
      --bg:         #eef3fa;
      --card:       #ffffff;
      --border:     #dde8f5;
      --text:       #0d1f3c;
      --muted:      #5a6b82;
      --green:      #16a34a;
      --green-bg:   #dcfce7;
      --amber:      #d97706;
      --amber-bg:   #fef3c7;
      --red:        #dc2626;
      --red-bg:     #fee2e2;
      --radius:     14px;
      --shadow:     0 4px 24px rgba(10,74,143,0.10);
      --shadow-lg:  0 8px 40px rgba(10,74,143,0.16);
    }
    [data-theme="dark"] {
      --bg:         #0d1623;
      --card:       #132039;
      --border:     #1e3a5f;
      --text:       #e8f0fe;
      --muted:      #7fa4cc;
      --green-bg:   rgba(22,163,74,0.15);
      --amber-bg:   rgba(217,119,6,0.15);
      --red-bg:     rgba(220,38,38,0.15);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      transition: background 0.3s, color 0.3s;
    }

    /* ── HEADER ── */
    .site-header {
      background: linear-gradient(135deg, var(--blue-main) 0%, var(--blue-mid) 60%, var(--blue-dark) 100%);
      position: sticky; top: 0; z-index: 100;
      box-shadow: 0 4px 20px rgba(11,99,183,0.3);
    }
    .header-inner {
      width: 100%; padding: 0 28px; height: 62px;
      display: flex; align-items: center; justify-content: space-between; gap: 12px;
    }
    .brand { display: flex; align-items: center; gap: 10px; text-decoration: none; flex-shrink: 0; }
    .brand-name { font-family: 'Merriweather', serif; font-size: 20px; font-weight: 900; color: #fff; }
    .nav-links { display: flex; align-items: center; gap: 4px; }
    .nav-links a {
      color: rgba(255,255,255,0.85); text-decoration: none; font-size: 13px; font-weight: 600;
      padding: 7px 13px; border-radius: 8px; transition: background 0.2s; white-space: nowrap;
    }
    .nav-links a:hover, .nav-links a.active { background: rgba(255,255,255,0.15); color: #fff; }
    .header-right { display: flex; align-items: center; gap: 8px; }
    .theme-btn {
      background: rgba(255,255,255,0.15); border: none; border-radius: 8px;
      padding: 7px 10px; cursor: pointer; font-size: 16px; color: white; transition: background 0.2s;
    }
    .theme-btn:hover { background: rgba(255,255,255,0.25); }
    .logout-btn-hdr {
      background: rgba(220,38,38,0.85); color: white; border: none;
      padding: 7px 14px; border-radius: 8px; font-size: 12px; font-weight: 700;
      cursor: pointer; font-family: 'DM Sans', sans-serif; transition: background 0.2s;
    }
    .logout-btn-hdr:hover { background: #dc2626; }
    .hamburger { display: none; flex-direction: column; gap: 5px; background: none; border: none; cursor: pointer; padding: 6px; }
    .hamburger span { display: block; width: 22px; height: 2px; background: #fff; border-radius: 2px; transition: transform 0.3s, opacity 0.3s; }
    .hamburger.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
    .hamburger.open span:nth-child(2) { opacity: 0; }
    .hamburger.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }
    .mobile-nav { display: none; flex-direction: column; background: var(--blue-dark); border-top: 1px solid rgba(255,255,255,0.1); }
    .mobile-nav.open { display: flex; }
    .mobile-nav a { color: rgba(255,255,255,0.85); text-decoration: none; font-size: 14px; font-weight: 600; padding: 14px 24px; border-bottom: 1px solid rgba(255,255,255,0.06); transition: background 0.2s; }
    .mobile-nav a:hover { background: rgba(255,255,255,0.08); }
    .mobile-nav-logout { background: none; border: none; color: #fca5a5; font-size: 14px; font-weight: 600; padding: 14px 24px; text-align: left; cursor: pointer; font-family: 'DM Sans', sans-serif; }

    /* ── MAIN ── */
    main { width: 100%; padding: 28px 28px 56px; }

    @keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── LOADING ── */
    .loading-wrap {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      min-height: 60vh; gap: 16px; color: var(--muted);
    }
    .spinner {
      width: 42px; height: 42px; border: 4px solid var(--border);
      border-top-color: var(--blue-main); border-radius: 50%; animation: spin 0.8s linear infinite;
    }

    /* ── BATCH HERO CARD ── */
    .batch-hero {
      background: linear-gradient(135deg, var(--blue-main) 0%, var(--blue-mid) 60%, var(--blue-dark) 100%);
      border-radius: var(--radius);
      padding: 28px 32px;
      margin-bottom: 22px;
      color: white;
      position: relative;
      overflow: hidden;
      animation: fadeUp 0.35s ease both;
    }
    .batch-hero::before {
      content: '';
      position: absolute; inset: 0;
      background-image: radial-gradient(circle, rgba(255,255,255,0.06) 1px, transparent 1px);
      background-size: 22px 22px;
      pointer-events: none;
    }
    .batch-hero-inner { position: relative; z-index: 1; display: flex; align-items: flex-start; justify-content: space-between; flex-wrap: wrap; gap: 16px; }
    .batch-hero-left h1 {
      font-family: 'Merriweather', serif;
      font-size: clamp(20px, 3.5vw, 26px);
      font-weight: 700; margin-bottom: 6px; line-height: 1.2;
    }
    .batch-hero-left p { font-size: 13px; opacity: 0.75; line-height: 1.6; max-width: 480px; }
    .batch-meta-pills { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 16px; }
    .meta-pill {
      display: inline-flex; align-items: center; gap: 5px;
      background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.25);
      border-radius: 50px; padding: 5px 13px;
      font-size: 12px; font-weight: 600; color: rgba(255,255,255,0.95);
    }
    .batch-hero-badge {
      background: rgba(255,255,255,0.18);
      border: 1px solid rgba(255,255,255,0.3);
      border-radius: 12px; padding: 14px 20px;
      text-align: center; flex-shrink: 0;
    }
    .batch-hero-badge .badge-val { font-family: 'Merriweather', serif; font-size: 28px; font-weight: 700; line-height: 1; }
    .batch-hero-badge .badge-lbl { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; opacity: 0.75; margin-top: 4px; }

    /* ── SCHEDULE SECTION ── */
    .section-head {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 16px; flex-wrap: wrap; gap: 10px;
      animation: fadeUp 0.35s 0.1s ease both;
    }
    .section-head h2 { font-family: 'Merriweather', serif; font-size: 17px; font-weight: 700; color: var(--text); }
    .filter-row { display: flex; gap: 8px; flex-wrap: wrap; }
    .filter-btn {
      background: var(--card); border: 1px solid var(--border); border-radius: 8px;
      padding: 6px 14px; font-size: 12px; font-weight: 600; color: var(--muted);
      cursor: pointer; font-family: 'DM Sans', sans-serif; transition: all 0.2s;
    }
    .filter-btn:hover, .filter-btn.active {
      background: var(--blue-main); color: #fff; border-color: var(--blue-main);
    }

    /* Search bar */
    .search-bar {
      background: var(--card); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 10px 16px; margin-bottom: 16px; display: flex; align-items: center; gap: 10px;
      animation: fadeUp 0.35s 0.12s ease both;
    }
    .search-bar input {
      flex: 1; border: none; background: transparent; font-family: 'DM Sans', sans-serif;
      font-size: 14px; color: var(--text); outline: none;
    }
    .search-bar input::placeholder { color: var(--muted); }

    /* Schedule table */
    .schedule-wrap {
      background: var(--card); border: 1px solid var(--border); border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      animation: fadeUp 0.35s 0.14s ease both;
    }
    .schedule-table { width: 100%; border-collapse: collapse; min-width: 420px; }
    .schedule-table thead tr { background: linear-gradient(135deg, var(--blue-main), var(--blue-mid)); }
    .schedule-table thead th {
      padding: 14px 16px; text-align: left; font-size: 11px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.8px; color: rgba(255,255,255,0.95);
      white-space: nowrap;
    }
    .schedule-table tbody tr { border-bottom: 1px solid var(--border); transition: background 0.15s; }
    .schedule-table tbody tr:last-child { border-bottom: none; }
    .schedule-table tbody tr:hover { background: rgba(11,99,183,0.04); }
    .schedule-table td { padding: 14px 16px; font-size: 13px; color: var(--text); vertical-align: middle; }
    .schedule-table td:first-child { font-family: 'Merriweather', serif; font-size: 14px; font-weight: 700; color: var(--blue-main); text-align: center; width: 50px; }
    .schedule-table td:last-child { max-width: 240px; word-break: break-word; line-height: 1.4; }

    /* Row status highlight */
    .row-today { background: rgba(22,163,74,0.06) !important; }
    .row-today td:first-child { color: var(--green) !important; }
    .row-past { opacity: 0.55; }

    /* Today badge */
    .today-badge {
      display: inline-flex; align-items: center; gap: 4px;
      background: var(--green-bg); color: var(--green);
      border-radius: 20px; padding: 2px 9px; font-size: 10px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.5px; margin-left: 6px;
    }

    /* Subject chip */
    .subject-chip {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 4px 11px; border-radius: 20px; font-size: 11px; font-weight: 700;
    }
    .chip-bio    { background: #dcfce7; color: #15803d; }
    .chip-phys   { background: #dbeafe; color: #1d4ed8; }
    .chip-chem   { background: #fef3c7; color: #b45309; }
    .chip-eng    { background: #fce7f3; color: #9d174d; }
    .chip-logic  { background: #ede9fe; color: #6d28d9; }
    .chip-weekly   { background: #fee2e2; color: #b91c1c; }
    .chip-full   { background: #f0fdf4; color: #166534; }
    .chip-other  { background: var(--border); color: var(--muted); }
    [data-theme="dark"] .chip-bio   { background: rgba(22,163,74,0.18); color: #4ade80; }
    [data-theme="dark"] .chip-phys  { background: rgba(29,78,216,0.18); color: #93c5fd; }
    [data-theme="dark"] .chip-chem  { background: rgba(180,83,9,0.18);  color: #fcd34d; }
    [data-theme="dark"] .chip-eng   { background: rgba(157,23,77,0.18); color: #f9a8d4; }
    [data-theme="dark"] .chip-logic { background: rgba(109,40,217,0.18);color: #c4b5fd; }
    [data-theme="dark"] .chip-weekly  { background: rgba(185,28,28,0.18); color: #fca5a5; }

    /* Empty / no schedule */
    .empty-state {
      text-align: center; padding: 48px 24px; color: var(--muted);
    }
    .empty-state .icon { font-size: 40px; margin-bottom: 12px; }
    .empty-state p { font-size: 14px; line-height: 1.6; }

    /* Skeleton */
    .skel {
      display: inline-block; background: linear-gradient(90deg, var(--border) 25%, rgba(221,232,245,0.5) 50%, var(--border) 75%);
      background-size: 200% 100%; animation: shimmer 1.4s infinite; border-radius: 6px;
    }
    @keyframes shimmer { 0%{background-position:-200% 0} 100%{background-position:200% 0} }

    /* ── STATS ROW ── */
    .stats-row {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(140px,1fr));
      gap: 14px; margin-bottom: 22px;
      animation: fadeUp 0.35s 0.05s ease both;
    }
    .stat-card {
      background: var(--card); border: 1px solid var(--border); border-radius: var(--radius);
      box-shadow: var(--shadow); padding: 18px 16px; text-align: center;
      border-left: 4px solid var(--blue-main);
    }
    .stat-val { font-family: 'Merriweather', serif; font-size: 24px; font-weight: 700; color: var(--blue-main); line-height: 1; }
    .stat-lbl { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.7px; color: var(--muted); margin-top: 5px; }

    /* ── RESPONSIVE ── */
    @media(max-width: 768px) {
      .nav-links { display: none; }
      .hamburger { display: flex; }
      main { padding: 18px 16px 48px; }
      .batch-hero { padding: 22px 20px; }
      .batch-hero-badge { display: none; }
      .schedule-table td, .schedule-table th { padding: 10px 10px; font-size: 12px; }
      .schedule-table td:nth-child(3) { display: none; } /* hide Day column */
      .schedule-table td:first-child { font-size: 13px; width: 40px; }
      .schedule-table td:last-child { max-width: 180px; }
      .filter-row { gap: 6px; }
      .filter-btn { padding: 6px 12px; font-size: 11px; }
      .search-wrap input { font-size: 13px; }
    }
    @media(max-width: 480px) {
      .stats-row { grid-template-columns: repeat(2,1fr); gap: 10px; }
      .stat-val { font-size: 20px; }
      main { padding: 14px 12px 48px; }
      .batch-hero { padding: 18px 16px; border-radius: 12px; }
      .batch-hero-left h1 { font-size: 18px; }
      .batch-hero-left p { font-size: 12px; }
      .batch-meta-pills { gap: 6px; }
      .meta-pill { font-size: 11px; padding: 4px 10px; }
      /* Table: tighter on very small screens */
      .schedule-table td, .schedule-table th { padding: 9px 8px; font-size: 11px; }
      .schedule-table td:first-child { font-size: 12px; width: 34px; }
      .subject-chip { font-size: 10px; padding: 3px 8px; }
      .today-badge { font-size: 9px; padding: 1px 6px; }
    }
    @media(max-width: 360px) {
      .schedule-table { min-width: 320px; }
      main { padding: 12px 10px 48px; }
    }
  </style>
</head>

<script>
// ── Theme ──
const themeBtn = document.getElementById('themeBtn');
const getTheme = () => document.documentElement.getAttribute('data-theme') || 'light';
const applyTheme = t => {
  document.documentElement.setAttribute('data-theme', t);
  themeBtn.textContent = t === 'dark' ? '☀️' : '🌙';
};
applyTheme(getTheme());
themeBtn.addEventListener('click', () => applyTheme(getTheme() === 'dark' ? 'light' : 'dark'));

// ── Hamburger ──
document.getElementById('hamburger').addEventListener('click', function() {
  this.classList.toggle('open');
  document.getElementById('mobileNav').classList.toggle('open');
});

// ── Subject chip helper ──
function subjectChip(subject) {
  if (!subject) return `<span class="subject-chip chip-other">—</span>`;
  const s = subject.toLowerCase();
  let cls = 'chip-other';
  if (s.includes('bio'))     cls = 'chip-bio';
  else if (s.includes('phy')) cls = 'chip-phys';
  else if (s.includes('chem'))cls = 'chip-chem';
  else if (s.includes('eng')) cls = 'chip-eng';
  else if (s.includes('log') || s.includes('reason')) cls = 'chip-logic';
  else if (s.includes('weekly') || s.includes('general'))  cls = 'chip-weekly';
  return `<span class="subject-chip ${cls}">${subject}</span>`;
}

// ── Date helpers ──
function parseRowDate(dateStr) {
  if (!dateStr) return null;
  // Supports formats: "19-Jan-26", "2026-01-19", "19/01/2026", etc.
  const d = new Date(dateStr);
  if (!isNaN(d)) return d;
  // Try dd-Mon-yy
  const m = dateStr.match(/^(\d{1,2})[\/\-]([A-Za-z]+)[\/\-](\d{2,4})$/);
  if (m) {
    const year = m[3].length === 2 ? '20' + m[3] : m[3];
    return new Date(`${m[2]} ${m[1]}, ${year}`);
  }
  return null;
}

function formatDate(dateStr) {
  const d = parseRowDate(dateStr);
  if (!d || isNaN(d)) return dateStr || '—';
  return d.toLocaleDateString('en-PK', { day: 'numeric', month: 'short', year: 'numeric' });
}

function isToday(dateStr) {
  const d = parseRowDate(dateStr);
  if (!d || isNaN(d)) return false;
  const now = new Date();
  return d.getDate() === now.getDate() && d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
}

function isPast(dateStr) {
  const d = parseRowDate(dateStr);
  if (!d || isNaN(d)) return false;
  const now = new Date(); now.setHours(0,0,0,0);
  const dd  = new Date(d); dd.setHours(0,0,0,0);
  return dd < now;
}

// ── Render schedule table ──
let _allRows = [];
let _activeFilter = 'all';
let _searchQuery = '';

function renderTable() {
  const tbody = document.getElementById('scheduleBody');
  if (!tbody) return;

  let rows = _allRows.filter(r => {
    // Subject filter
    if (_activeFilter !== 'all') {
      const sub = (r.subject || '').toLowerCase();
      if (!sub.includes(_activeFilter)) return false;
    }
    // Search
    if (_searchQuery) {
      const q = _searchQuery.toLowerCase();
      const haystack = [r.test_no, r.date, r.day, r.subject, r.chapter].join(' ').toLowerCase();
      if (!haystack.includes(q)) return false;
    }
    return true;
  });

  if (!rows.length) {
    tbody.innerHTML = `<tr><td colspan="5"><div class="empty-state"><div class="icon">📋</div><p>No schedule entries match your filter.</p></div></td></tr>`;
    return;
  }

  tbody.innerHTML = rows.map(r => {
    const today = isToday(r.date);
    const past  = !today && isPast(r.date);
    const rowCls = today ? 'row-today' : (past ? 'row-past' : '');
    const todayBadge = today ? `<span class="today-badge">Today</span>` : '';
    return `
      <tr class="${rowCls}">
        <td>${r.test_no ?? '—'}</td>
        <td>${formatDate(r.date)}${todayBadge}</td>
        <td>${r.day || '—'}</td>
        <td>${subjectChip(r.subject)}</td>
        <td>${r.chapter || '—'}</td>
      </tr>`;
  }).join('');
}

function setFilter(f, btn) {
  _activeFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderTable();
}

// ── Main init ──
async function init() {
  try {
    const { data: { user } } = await supabaseClient.auth.getUser();
    if (!user) { window.location.href = 'index.html'; return; }

    // Get user's batch_id
    const { data: userRows } = await supabaseClient
      .from('users').select('first_name, last_name, batch_id').eq('id', user.id);
    const userRow = userRows?.[0];

    if (!userRow?.batch_id) {
      // Not assigned to a batch — redirect to enrollment
      window.location.href = 'batches.html';
      return;
    }

    const batchId = userRow.batch_id;

    // Get batch details
    const { data: batch } = await supabaseClient
      .from('batches').select('*').eq('id', batchId).single();

    // Get schedule rows
    const { data: schedule } = await supabaseClient
      .from('batch_schedules')
      .select('*')
      .eq('batch_id', batchId)
      .order('test_no', { ascending: true });

    _allRows = (schedule || []).sort((a, b) => Number(a.test_no) - Number(b.test_no)); // numeric sort fix

    // Calculate stats
    const total    = _allRows.length;
    const done     = _allRows.filter(r => isPast(r.date)).length;
    const upcoming = _allRows.filter(r => !isPast(r.date) && !isToday(r.date)).length;
    const todayRow = _allRows.find(r => isToday(r.date));
    const userName = [userRow.first_name, userRow.last_name].filter(Boolean).join(' ') || 'Student';

    // Build page HTML
    const content = document.getElementById('pageContent');
    content.innerHTML = `
      <!-- Batch hero -->
      <div class="batch-hero">
        <div class="batch-hero-inner">
          <div class="batch-hero-left">
            <h1>🗂 ${batch?.name || 'My Batch'}</h1>
            <p>${batch?.description || 'Your enrolled batch — track your upcoming tests and schedule below.'}</p>
            <div class="batch-meta-pills">
              ${batch?.academic_year ? `<span class="meta-pill">📅 ${batch.academic_year}</span>` : ''}
              ${batch?.start_date    ? `<span class="meta-pill">🟢 Started ${new Date(batch.start_date).toLocaleDateString('en-PK',{day:'numeric',month:'short',year:'numeric'})}</span>` : ''}
              ${batch?.end_date      ? `<span class="meta-pill">🔴 Ends ${new Date(batch.end_date).toLocaleDateString('en-PK',{day:'numeric',month:'short',year:'numeric'})}</span>` : ''}
              <span class="meta-pill">👤 ${userName}</span>
            </div>
          </div>
          <div class="batch-hero-badge">
            <div class="badge-val">${total}</div>
            <div class="badge-lbl">Total Tests</div>
          </div>
        </div>
      </div>

      <!-- Stats row -->
      <div class="stats-row">
        <div class="stat-card">
          <div class="stat-val">${total}</div>
          <div class="stat-lbl">Scheduled</div>
        </div>
        <div class="stat-card" style="border-left-color:var(--green);">
          <div class="stat-val" style="color:var(--green);">${done}</div>
          <div class="stat-lbl">Completed</div>
        </div>
        <div class="stat-card" style="border-left-color:var(--amber);">
          <div class="stat-val" style="color:var(--amber);">${upcoming}</div>
          <div class="stat-lbl">Upcoming</div>
        </div>
        <div class="stat-card" style="border-left-color:var(--red);">
          <div class="stat-val" style="color:var(--red);">${todayRow ? '1' : '0'}</div>
          <div class="stat-lbl">Today</div>
        </div>
      </div>

      <!-- Section head + filters -->
      <div class="section-head">
        <h2>📅 Test Schedule</h2>
        <div class="filter-row">
          <button class="filter-btn active" onclick="setFilter('all',this)">All</button>
          <button class="filter-btn" onclick="setFilter('bio',this)">Biology</button>
          <button class="filter-btn" onclick="setFilter('phy',this)">Physics</button>
          <button class="filter-btn" onclick="setFilter('chem',this)">Chemistry</button>
          <button class="filter-btn" onclick="setFilter('weekly',this)">Weekly</button>
        </div>
      </div>

      <!-- Search -->
      <div class="search-bar">
        <span>🔍</span>
        <input type="text" id="scheduleSearch" placeholder="Search by subject, chapter, date…" oninput="onSearch(this.value)">
      </div>

      <!-- Table -->
      ${total === 0 ? `
        <div class="schedule-wrap">
          <div class="empty-state">
            <div class="icon">📋</div>
            <p>No schedule uploaded yet for your batch.<br>Check back soon — your admin will upload the test schedule shortly.</p>
          </div>
        </div>
      ` : `
        <div class="schedule-wrap">
          <table class="schedule-table">
            <thead>
              <tr>
                <th style="text-align:center;">#</th>
                <th>Date</th>
                <th>Day</th>
                <th>Subject</th>
                <th>Chapter / Test Type</th>
              </tr>
            </thead>
            <tbody id="scheduleBody"></tbody>
          </table>
        </div>
      `}
    `;

    document.getElementById('loadingState').style.display = 'none';
    content.style.display = 'block';

    if (total > 0) renderTable();

  } catch(e) {
    console.error('my-batch init error:', e);
    document.getElementById('loadingState').innerHTML =
      `<div class="empty-state"><div class="icon">❌</div><p>Failed to load batch. Please refresh.</p></div>`;
  }
}

function onSearch(val) {
  _searchQuery = val.trim();
  renderTable();
}

document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
