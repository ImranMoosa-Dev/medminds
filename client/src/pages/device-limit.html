<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Device Limit – MedMinds</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:#f0f4f8;--card:#ffffff;--border:#e0e0e0;--text:#1a1a1a;--muted:#666666;
      --blue:#0b63b7;--blue-dark:#0a4a8f;--red:#dc2626;--red-bg:#fee2e2;
      --red-border:#fca5a5;--amber:#d97706;--amber-bg:#fef3c7;
      --shadow:0 8px 32px rgba(11,99,183,0.12);
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);min-height:100vh;
      display:flex;align-items:center;justify-content:center;padding:24px 16px;}
    .card{background:var(--card);border:1px solid var(--border);border-radius:20px;
      box-shadow:var(--shadow);padding:40px;width:100%;max-width:460px;text-align:center;}
    .icon-wrap{width:80px;height:80px;border-radius:50%;background:var(--red-bg);
      border:2px solid var(--red-border);display:flex;align-items:center;justify-content:center;
      margin:0 auto 22px;font-size:36px;}
    h1{font-size:22px;font-weight:700;color:var(--red);margin-bottom:10px;}
    .subtitle{font-size:14px;color:var(--muted);line-height:1.6;margin-bottom:26px;}
    .devices-box{background:var(--amber-bg);border:1px solid #fcd34d;border-radius:12px;
      padding:16px;margin-bottom:24px;text-align:left;}
    .devices-box h3{font-size:11px;font-weight:700;text-transform:uppercase;
      letter-spacing:.5px;color:var(--amber);margin-bottom:12px;}
    .device-item{display:flex;align-items:center;gap:10px;padding:9px 0;
      border-bottom:1px solid #fde68a;font-size:13px;color:#92400e;}
    .device-item:last-child{border-bottom:none;}
    .device-icon{font-size:20px;flex-shrink:0;}
    .device-name{font-weight:600;}
    .device-time{font-size:11px;color:#b45309;margin-top:2px;}
    .alert{padding:11px 14px;border-radius:8px;font-size:13px;margin-bottom:14px;
      display:none;text-align:left;animation:slideDown .25s ease;}
    .alert.show{display:block;}
    .alert.error{background:var(--red-bg);color:#7f1d1d;border-left:4px solid var(--red);}
    .alert.success{background:#dcfce7;color:#14532d;border-left:4px solid #16a34a;}
    @keyframes slideDown{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
    .btn-group{display:flex;flex-direction:column;gap:12px;}
    .btn{width:100%;padding:14px;border:none;border-radius:10px;font-size:15px;
      font-weight:700;font-family:inherit;cursor:pointer;transition:opacity .2s,transform .1s;}
    .btn:hover{opacity:.9;transform:translateY(-1px);}
    .btn:active{transform:translateY(0);}
    .btn:disabled{opacity:.6;cursor:not-allowed;transform:none;}
    .btn-primary{background:linear-gradient(135deg,#0b63b7,#0a4a8f);color:#fff;
      box-shadow:0 4px 16px rgba(11,99,183,.3);}
    .btn-danger{background:linear-gradient(135deg,#dc2626,#b91c1c);color:#fff;
      box-shadow:0 4px 16px rgba(220,38,38,.3);}
    .btn-secondary{background:var(--bg);color:var(--text);border:1.5px solid var(--border);}
    @keyframes spin{to{transform:rotate(360deg)}}
    .spinner{display:inline-block;width:15px;height:15px;border:2px solid rgba(255,255,255,.35);
      border-top-color:#fff;border-radius:50%;animation:spin .8s linear infinite;
      margin-right:8px;vertical-align:middle;}
    @media(max-width:480px){.card{padding:28px 20px;}h1{font-size:19px;}}
  </style>
</head>
<body>
  <div class="card">
    <div class="icon-wrap" id="iconWrap">🔐</div>
    <h1 id="heading">Device Limit Reached</h1>
    <p class="subtitle" id="subtitle">Loading...</p>

    <div id="alertBox" class="alert"></div>

    <!-- Devices list — only shown in limit-reached mode -->
    <div class="devices-box" id="devicesBox" style="display:none;">
      <h3>⚠️ Currently Active Devices</h3>
      <div id="devicesList"></div>
    </div>

    <div class="btn-group" id="btnGroup"></div>
  </div>

  <script src="script.js"></script>
  <script>
    const isKicked      = sessionStorage.getItem('mm_kicked') === '1';
    const pendingDevices = sessionStorage.getItem('mm_pending_devices');

    function showAlert(msg, type = 'error') {
      const el = document.getElementById('alertBox');
      el.textContent = msg;
      el.className = `alert ${type} show`;
    }

    function setLoading(on, btnId) {
      const btn = document.getElementById(btnId);
      if (!btn) return;
      btn.disabled = on;
      btn.innerHTML = on
        ? `<span class="spinner"></span>Processing...`
        : btn.dataset.label;
    }

    // ── MODE A: User was kicked (session wiped by another device)
    function renderKickedMode() {
      sessionStorage.removeItem('mm_kicked');

      document.getElementById('heading').textContent  = 'You Were Logged Out';
      document.getElementById('subtitle').innerHTML   =
        'Another device logged into your account and you were logged out from this device.';

      document.getElementById('btnGroup').innerHTML = `
        <button class="btn btn-primary" onclick="window.location.href='index.html'">
          → Go to Login
        </button>`;
    }

    // ── MODE B: User tried 3rd device (still logged in, needs to choose)
    function renderLimitMode() {
      const devices = pendingDevices ? JSON.parse(pendingDevices) : [];
      const count   = devices.length;

      document.getElementById('heading').textContent  = 'Device Limit Reached';
      document.getElementById('subtitle').innerHTML   =
        `Your account is already active on <strong>${count} device${count !== 1 ? 's' : ''}</strong>.<br>Logout those devices to continue here.`;

      // Show devices list
      const icons = { 'Mobile': '📱', 'Tablet': '📟', 'Desktop': '💻' };
      document.getElementById('devicesBox').style.display = 'block';
      document.getElementById('devicesList').innerHTML = devices.length
        ? devices.map(d => {
            const icon = icons[d.device?.split('/')[0]?.trim()] || '💻';
            const time = d.since ? new Date(d.since).toLocaleString('en-PK', {
              day: '2-digit', month: 'short', hour: '2-digit', minute: '2-digit'
            }) : 'Unknown time';
            return `<div class="device-item">
              <span class="device-icon">${icon}</span>
              <div>
                <div class="device-name">${d.device || 'Unknown Device'}</div>
                <div class="device-time">Logged in: ${time}</div>
              </div>
            </div>`;
          }).join('')
        : '<div class="device-item"><span class="device-icon">📱</span><div class="device-name">Active devices</div></div>';

      document.getElementById('btnGroup').innerHTML = `
        <button class="btn btn-danger" id="logoutBtn" data-label="🚪 Logout Other Devices &amp; Continue Here"
          onclick="logoutOtherDevices()">
          🚪 Logout Other Devices &amp; Continue Here
        </button>
        <button class="btn btn-secondary" onclick="cancelAndGoBack()">
          ← Cancel — Go Back to Login
        </button>`;
    }

    async function logoutOtherDevices() {
      setLoading(true, 'logoutBtn');
      try {
        const { data: { user }, error } = await supabaseClient.auth.getUser();
        if (error || !user) throw new Error('Session expired. Please login again.');

        // Delete all old sessions from DB
        await supabaseClient.from('user_sessions').delete().eq('user_id', user.id);

        // Supabase: sign out other devices
        await supabaseClient.auth.signOut({ scope: 'others' });

        // Register this device
        const token   = 'sess_' + Date.now() + '_' + Math.random().toString(36).slice(2, 10);
        const ua      = navigator.userAgent;
        const device  = /mobile/i.test(ua) ? 'Mobile' : /tablet/i.test(ua) ? 'Tablet' : 'Desktop';
        const browser = /chrome/i.test(ua) ? 'Chrome' : /firefox/i.test(ua) ? 'Firefox'
                      : /safari/i.test(ua) ? 'Safari'  : /edge/i.test(ua)   ? 'Edge'   : 'Browser';

        localStorage.setItem('mm_session_token', token);
        await supabaseClient.from('user_sessions').insert({
          user_id: user.id, session_token: token,
          device_info: `${device} / ${browser}`,
          last_active: new Date().toISOString()
        });

        sessionStorage.removeItem('mm_pending_userid');
        sessionStorage.removeItem('mm_pending_devices');

        showAlert('✅ Other devices logged out! Redirecting...', 'success');
        setTimeout(() => {
          const adminEmails = ['admin@medminds.com', 'service.medminds@gmail.com'];
          window.location.href = adminEmails.includes(user.email) ? 'admin.html' : 'quiz-selection.html';
        }, 1200);

      } catch(e) {
        showAlert(e.message || 'Error — please try again.');
        setLoading(false, 'logoutBtn');
      }
    }

    async function cancelAndGoBack() {
      await supabaseClient.auth.signOut();
      localStorage.removeItem('mm_session_token');
      sessionStorage.removeItem('mm_pending_userid');
      sessionStorage.removeItem('mm_pending_devices');
      window.location.href = 'index.html';
    }

    document.addEventListener('DOMContentLoaded', async () => {
      if (isKicked) {
        // Came here because session was wiped — no auth needed
        renderKickedMode();
        return;
      }

      // Came here because of device limit — verify still logged in
      const { data: { user } } = await supabaseClient.auth.getUser();
      if (!user || !pendingDevices) {
        window.location.href = 'index.html';
        return;
      }
      renderLimitMode();
    });
  </script>
</body>
</html>
