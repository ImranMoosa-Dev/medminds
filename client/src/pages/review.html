<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Review – MedMinds</title>
  <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@400;700;900&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root{--blue-dark:#072f6b;--blue-mid:#0a4a8f;--blue-main:#0b63b7;--bg:#eef3fa;--card:#ffffff;--border:#dde8f5;--text:#0d1f3c;--muted:#5a6b82;--green:#16a34a;--green-bg:#dcfce7;--amber:#d97706;--amber-bg:#fef3c7;--red:#dc2626;--red-bg:#fee2e2;--radius:14px;--shadow:0 4px 24px rgba(10,74,143,.10);}
    [data-theme="dark"]{--bg:#0d1623;--card:#132039;--border:#1e3a5f;--text:#e8f0fe;--muted:#7fa4cc;--green-bg:rgba(22,163,74,.18);--amber-bg:rgba(217,119,6,.18);--red-bg:rgba(220,38,38,.18);}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;transition:background .3s,color .3s;}

    /* HEADER */
    .site-header{background:linear-gradient(135deg,var(--blue-main) 0%,var(--blue-mid) 60%,var(--blue-dark) 100%);position:sticky;top:0;z-index:100;box-shadow:0 4px 20px rgba(11,99,183,.3);}
    .header-inner{width:100%;padding:0 24px;height:58px;display:flex;align-items:center;justify-content:space-between;gap:12px;}
    .brand{display:flex;align-items:center;gap:10px;text-decoration:none;flex-shrink:0;}
    .brand-name{font-family:'Merriweather',serif;font-size:19px;font-weight:900;color:#fff;}
    .hdr-right{display:flex;align-items:center;gap:8px;}
    .theme-btn{background:rgba(255,255,255,.15);border:none;border-radius:8px;padding:6px 10px;cursor:pointer;font-size:15px;color:white;}
    .back-btn{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.25);border-radius:8px;padding:6px 14px;font-size:12px;font-weight:600;color:rgba(255,255,255,.9);text-decoration:none;}
    .back-btn:hover,.theme-btn:hover{background:rgba(255,255,255,.25);}

    /* LOADING */
    .loading-overlay{display:flex;align-items:center;justify-content:center;min-height:calc(100vh - 58px);flex-direction:column;gap:16px;color:var(--muted);}
    .spinner{width:42px;height:42px;border:4px solid var(--border);border-top-color:var(--blue-main);border-radius:50%;animation:spin .8s linear infinite;}
    @keyframes spin{to{transform:rotate(360deg);}}

    /* PAGE */
    .page{max-width:860px;margin:0 auto;padding:28px 24px 60px;}
    @keyframes fadeUp{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}

    /* SUMMARY BANNER */
    .summary-banner{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);padding:20px 24px;display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:24px;animation:fadeUp .3s ease both;}
    .sstat{text-align:center;padding:12px;}
    .sstat-val{font-family:'Merriweather',serif;font-size:26px;font-weight:700;color:var(--blue-main);line-height:1;}
    .sstat-lbl{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);margin-top:4px;}

    /* SECTION HEADER */
    .section-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:8px;}
    .section-head h2{font-family:'Merriweather',serif;font-size:17px;font-weight:700;color:var(--text);}
    .legend{display:flex;gap:12px;flex-wrap:wrap;}
    .legend-item{display:flex;align-items:center;gap:5px;font-size:12px;font-weight:600;color:var(--muted);}
    .leg-dot{width:10px;height:10px;border-radius:3px;flex-shrink:0;}

    /* REVIEW CARDS */
    .review-list{display:flex;flex-direction:column;gap:10px;margin-bottom:28px;}
    .review-card{background:var(--card);border:1px solid var(--border);border-radius:12px;box-shadow:var(--shadow);display:flex;align-items:center;gap:14px;padding:16px 18px;transition:border-color .2s;}
    .review-card:hover{border-color:var(--blue-main);}
    .review-card.answered{border-left:4px solid var(--green);}
    .review-card.unanswered{border-left:4px solid var(--amber);}
    .q-num{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,var(--blue-main),var(--blue-mid));color:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;flex-shrink:0;font-family:'Merriweather',serif;}
    .review-card-body{flex:1;min-width:0;}
    .review-q-text{font-family:'Merriweather',serif;font-size:13px;font-weight:700;color:var(--text);line-height:1.5;margin-bottom:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .answer-pill{display:inline-flex;align-items:center;gap:6px;padding:4px 12px;border-radius:50px;font-size:12px;font-weight:700;}
    .answer-pill.answered{background:var(--green-bg);color:var(--green);}
    .answer-pill.unanswered{background:var(--amber-bg);color:var(--amber);}
    .review-card-action{flex-shrink:0;}
    .btn-edit{background:var(--bg);border:2px solid var(--border);border-radius:8px;padding:7px 14px;font-size:12px;font-weight:700;color:var(--text);cursor:pointer;font-family:'DM Sans',sans-serif;transition:border-color .2s,color .2s;}
    .q-image-frame{margin:8px 0 4px;border-radius:12px;overflow:hidden;border:2px solid var(--border);background:var(--bg);box-shadow:0 2px 12px rgba(11,99,183,.10);position:relative;width:100%;}
    .q-image-frame img{width:100%;height:auto;display:block;cursor:zoom-in;transition:transform .2s;}
    .q-image-frame img:hover{transform:scale(1.01);}
    .q-image-badge{position:absolute;top:8px;left:8px;background:rgba(11,99,183,.85);color:#fff;font-size:10px;font-weight:700;letter-spacing:.4px;padding:3px 9px;border-radius:20px;backdrop-filter:blur(4px);}
    #qImgLightbox{display:none;position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,.85);align-items:center;justify-content:center;cursor:zoom-out;}
    #qImgLightbox.open{display:flex;}
    #qImgLightbox img{max-width:92vw;max-height:88vh;border-radius:10px;box-shadow:0 8px 40px rgba(0,0,0,.6);object-fit:contain;}
    #qImgLightbox .lb-close{position:absolute;top:16px;right:20px;font-size:28px;color:#fff;cursor:pointer;line-height:1;font-weight:700;opacity:.8;}
    #qImgLightbox .lb-close:hover{opacity:1;}
    .btn-edit:hover{border-color:var(--blue-main);color:var(--blue-main);}

    /* ACTION BAR */
    .action-bar{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);padding:20px 24px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;}
    .action-bar p{font-size:13px;color:var(--muted);max-width:440px;line-height:1.5;}
    .action-btns{display:flex;gap:10px;flex-wrap:wrap;}
    .btn-back{background:var(--bg);border:2px solid var(--border);border-radius:10px;padding:11px 22px;font-size:13px;font-weight:700;color:var(--text);cursor:pointer;font-family:'DM Sans',sans-serif;text-decoration:none;display:inline-flex;align-items:center;gap:7px;transition:border-color .2s,color .2s;}
    .btn-back:hover{border-color:var(--blue-main);color:var(--blue-main);}
    .btn-submit-final{background:linear-gradient(135deg,var(--blue-main),var(--blue-mid));color:#fff;border:none;border-radius:10px;padding:11px 28px;font-size:13px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;box-shadow:0 4px 16px rgba(11,99,183,.3);transition:transform .15s,box-shadow .15s;}
    .btn-submit-final:hover{transform:translateY(-2px);box-shadow:0 6px 22px rgba(11,99,183,.4);}
    .btn-submit-final:disabled{opacity:.5;cursor:not-allowed;transform:none;}

    @media(max-width:560px){
      .page{padding:16px 14px 48px;}
      .summary-banner{grid-template-columns:repeat(3,1fr);gap:6px;padding:14px 12px;}
      .review-q-text{font-size:12px;}
      .action-bar{flex-direction:column;align-items:flex-start;}
    }
  
  /* ── PRINT PROTECTION ── */
  @media print {
    body * { display: none !important; visibility: hidden !important; }
    body::after {
      display: block !important;
      visibility: visible !important;
      content: "⚠️ MedMinds content printing is not allowed.";
      font-size: 22px;
      font-weight: bold;
      text-align: center;
      margin-top: 80px;
      color: #000;
      font-family: Arial, sans-serif;
    }
  }
</style>
</head>
<body>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script>
  (function(){
    const s=localStorage.getItem('medminds-theme');
    const d=window.matchMedia('(prefers-color-scheme: dark)').matches;
    document.documentElement.setAttribute('data-theme',s||(d?'dark':'light'));
  })();
</script>
<script src="script.js"></script>

<header class="site-header">
  <div class="header-inner">
    <a href="quiz-selection.html" class="brand">
      <span class="brand-name">MedMinds</span>
    </a>
    <div class="hdr-right">
      <button class="theme-btn" id="themeBtn">🌙</button>
      <button class="back-btn" onclick="window.location.href='quiz.html'" style="cursor:pointer;">← Back to Quiz</button>
    </div>
  </div>
</header>

<div id="loadingState" class="loading-overlay">
  <div class="spinner"></div>
  <p id="loadingText">Loading your progress…</p>
</div>

<div id="pageContent" style="display:none;">
  <div class="page">

    <!-- Summary -->
    <div class="summary-banner">
      <div class="sstat"><div class="sstat-val" id="totalCount">0</div><div class="sstat-lbl">Total</div></div>
      <div class="sstat"><div class="sstat-val" id="answeredCount" style="color:var(--green);">0</div><div class="sstat-lbl">Answered</div></div>
      <div class="sstat"><div class="sstat-val" id="unansweredCount" style="color:var(--amber);">0</div><div class="sstat-lbl">Unanswered</div></div>
    </div>

    <!-- Question list -->
    <div class="section-head">
      <h2>📋 Review Your Answers</h2>
      <div class="legend">
        <div class="legend-item"><div class="leg-dot" style="background:var(--green);"></div>Answered</div>
        <div class="legend-item"><div class="leg-dot" style="background:var(--amber);"></div>Unanswered</div>
      </div>
    </div>
    <div class="review-list" id="reviewList"></div>

    <!-- Action bar -->
    <div class="action-bar">
      <p id="actionMsg">Review your answers above. You can go back and change any answer before final submission.</p>
      <div class="action-btns">
        <button class="btn-back" onclick="window.location.href='quiz.html'">← Edit Answers</button>
        <button class="btn-submit-final" id="submitFinalBtn" onclick="finalSubmit()">✅ Confirm &amp; Submit</button>
      </div>
    </div>

  </div>
</div>

<script>
// ── Theme ──
const themeBtn = document.getElementById('themeBtn');
const getTheme = () => document.documentElement.getAttribute('data-theme') || 'light';
const applyTheme = t => { document.documentElement.setAttribute('data-theme',t); localStorage.setItem('medminds-theme',t); themeBtn.textContent = t==='dark'?'☀️':'🌙'; };
applyTheme(getTheme());
themeBtn.addEventListener('click', () => applyTheme(getTheme()==='dark'?'light':'dark'));

function setLoading(v, txt) {
  document.getElementById('loadingState').style.display = v ? 'flex' : 'none';
  if (txt) document.getElementById('loadingText').textContent = txt;
  document.getElementById('pageContent').style.display  = v ? 'none' : 'block';
}

let _questions = [], _answers = {}, _attemptId = null;

async function loadReview() {
  try {
    const { data: { user } } = await supabaseClient.auth.getUser();
    if (!user) { window.location.href = 'index.html'; return; }

    const quizId = localStorage.getItem('selectedQuizId');
    if (!quizId) { window.location.href = 'quiz-selection.html'; return; }

    // Fetch the in-progress (not completed) attempt
    const { data: attempts } = await supabaseClient
      .from('quiz_attempts').select('*')
      .eq('user_id', user.id).eq('quiz_id', quizId).eq('completed', false)
      .order('created_at', { ascending: false }).limit(1);

    const attempt = attempts?.[0];
    if (!attempt) {
      // No in-progress attempt — might already be submitted, go to result
      window.location.href = 'result.html'; return;
    }

    _attemptId = attempt.id;
    _answers   = attempt.answers || {};

    // Fetch questions
    const { data: qs } = await supabaseClient
      .from('questions').select('*').eq('quiz_id', quizId).order('id', { ascending: true });
    _questions = qs || [];

    renderReview();
    setLoading(false);
  } catch(e) {
    console.error('loadReview:', e);
    setLoading(false, 'Error loading review: ' + e.message);
  }
}

function renderReview() {
  const total     = _questions.length;
  const answered  = Object.keys(_answers).length;
  const remaining = total - answered;

  document.getElementById('totalCount').textContent     = total;
  document.getElementById('answeredCount').textContent  = answered;
  document.getElementById('unansweredCount').textContent = remaining;

  if (remaining > 0) {
    document.getElementById('actionMsg').textContent =
      `You have ${remaining} unanswered question(s). You can go back and answer them, or submit now.`;
  }

  const optMap = { a:'option_a', b:'option_b', c:'option_c', d:'option_d' };
  const labels = { a:'A', b:'B', c:'C', d:'D' };

  document.getElementById('reviewList').innerHTML = _questions.map((q, i) => {
    const given    = _answers[String(i)] || null;
    const cls      = given ? 'answered' : 'unanswered';
    const pillCls  = given ? 'answered' : 'unanswered';
    const pillTxt  = given
      ? `✓ ${labels[given]}: ${q[optMap[given]] || ''}`
      : '○ Not Answered';

    return `
      <div class="review-card ${cls}">
        <div class="q-num">${i+1}</div>
        <div class="review-card-body">
          <div class="review-q-text">${q.question}</div>
          ${q.img ? `<div class="q-image-frame"><span class="q-image-badge">Image</span><img src="${q.img}" alt="Question image" onclick="openImgLightbox(this.src)" onerror="this.parentElement.style.display='none'"></div>` : ''}
          <span class="answer-pill ${pillCls}">${pillTxt}</span>
        </div>
        <div class="review-card-action">
          <button class="btn-edit" onclick="goBackTo(${i})">✏️ Edit</button>
        </div>
      </div>`;
  }).join('');
}

async function goBackTo(idx) {
  // Store which question to jump to, then navigate freshly to quiz.html
  // history.back() uses bfcache so DOMContentLoaded never fires — use location.href instead
  sessionStorage.setItem('jumpToQuestion', String(idx));

  // Save the jump target to the attempt row so it survives a fresh page load
  try {
    if (_attemptId) {
      await supabaseClient
        .from('quiz_attempts')
        .update({ current_question: idx })
        .eq('id', _attemptId);
    }
  } catch(e) { console.warn('goBackTo save failed:', e); }

  window.location.href = 'quiz.html';
}

async function finalSubmit() {
  const btn = document.getElementById('submitFinalBtn');
  btn.disabled = true;
  btn.textContent = 'Submitting…';

  try {
    const { data: { user } } = await supabaseClient.auth.getUser();
    const quizId = localStorage.getItem('selectedQuizId');

    // Re-fetch latest answers from backend (in case user edited after opening review)
    const { data: fresh } = await supabaseClient
      .from('quiz_attempts').select('answers, total')
      .eq('id', _attemptId).single();

    const latestAnswers = fresh?.answers || _answers;
    const total         = fresh?.total   || _questions.length;

    // Calculate score
    let score = 0;
    _questions.forEach((q, i) => {
      if (latestAnswers[String(i)] === q.correct_answer) score++;
    });

    const { error } = await supabaseClient
      .from('quiz_attempts')
      .update({ completed: true, score, total, answers: latestAnswers })
      .eq('id', _attemptId);

    if (error) throw error;
    window.location.href = 'result.html';
  } catch(e) {
    console.error('finalSubmit:', e);
    btn.disabled = false;
    btn.textContent = '✅ Confirm & Submit';
    alert('Error submitting: ' + e.message);
  }
}

document.addEventListener('DOMContentLoaded', loadReview);
</script>

<!-- Image Lightbox -->
<div id="qImgLightbox" onclick="closeImgLightbox()">
  <span class="lb-close" onclick="closeImgLightbox()">✕</span>
  <img id="qImgLightboxImg" src="" alt="Question image enlarged">
</div>
<script>
function openImgLightbox(src) {
  document.getElementById('qImgLightboxImg').src = src;
  document.getElementById('qImgLightbox').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeImgLightbox() {
  document.getElementById('qImgLightbox').classList.remove('open');
  document.body.style.overflow = '';
}
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeImgLightbox(); });
</script>
</body>
</html>
