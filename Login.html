<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>MedMinds | Login</title>
    <link rel="stylesheet" href="style.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap"
      rel="stylesheet"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <style>
      :root {
        --bg-primary: #ffffff;
        --bg-secondary: #f0f4f8;
        --text-primary: #1a1a1a;
        --text-secondary: #666666;
        --border-color: #e0e0e0;
        --blue: #0b63b7;
        --blue-dark: #0a4a8f;
        --shadow: 0 8px 32px rgba(11, 99, 183, 0.12);
      }
      [data-theme="dark"] {
        --bg-primary: #1e2535;
        --bg-secondary: #141b2b;
        --text-primary: #f0f4ff;
        --text-secondary: #94a3b8;
        --border-color: #2e3d58;
        --shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: "Inter", system-ui, sans-serif;
        background: var(--bg-secondary);
        color: var(--text-primary);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
        transition:
          background 0.3s,
          color 0.3s;
      }

      .login-card {
        background: var(--bg-primary);
        border: 1px solid var(--border-color);
        border-radius: 18px;
        box-shadow: var(--shadow);
        padding: 40px;
        width: 100%;
        max-width: 440px;
      }

      .brand-container {
        display: flex;
        align-items: center;
        gap: 16px;
        margin-bottom: 28px;
      }
      .logo {
        width: 72px;
        height: 72px;
        border-radius: 14px;
        object-fit: cover;
        flex-shrink: 0;
      }
      .brand-text h1 {
        font-size: 22px;
        font-weight: 700;
        color: var(--blue);
        line-height: 1.2;
      }
      .brand-text p {
        font-size: 12px;
        color: var(--text-secondary);
        margin-top: 3px;
        text-transform: uppercase;
        letter-spacing: 0.6px;
      }

      .alert {
        padding: 12px 15px;
        border-radius: 8px;
        margin-bottom: 18px;
        font-size: 13px;
        display: none;
        animation: slideDown 0.25s ease;
      }
      .alert.show {
        display: block;
      }
      .alert.success {
        background: #d4edda;
        color: #155724;
        border-left: 4px solid #28a745;
      }
      .alert.error {
        background: #fde8e8;
        color: #7a1d1d;
        border-left: 4px solid #e53e3e;
      }
      [data-theme="dark"] .alert.success {
        background: #1e4620;
        color: #90ee90;
      }
      [data-theme="dark"] .alert.error {
        background: #4a1a1a;
        color: #ff9999;
      }
      @keyframes slideDown {
        from {
          opacity: 0;
          transform: translateY(-8px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .form-group {
        margin-bottom: 18px;
      }
      .form-group label {
        display: block;
        font-size: 13px;
        font-weight: 600;
        color: var(--text-primary);
        margin-bottom: 7px;
      }
      .form-group input {
        width: 100%;
        padding: 12px 14px;
        border: 1.5px solid var(--border-color);
        border-radius: 10px;
        font-size: 14px;
        font-family: inherit;
        background: var(--bg-secondary);
        color: var(--text-primary);
        transition:
          border-color 0.2s,
          box-shadow 0.2s;
      }
      .form-group input::placeholder {
        color: var(--text-secondary);
      }
      .form-group input:focus {
        outline: none;
        border-color: var(--blue);
        box-shadow: 0 0 0 3px rgba(11, 99, 183, 0.12);
        background: var(--bg-primary);
      }

      .btn-submit {
        width: 100%;
        padding: 13px;
        background: linear-gradient(135deg, var(--blue), var(--blue-dark));
        color: #fff;
        border: none;
        border-radius: 10px;
        font-size: 15px;
        font-weight: 700;
        font-family: inherit;
        cursor: pointer;
        transition:
          opacity 0.2s,
          transform 0.12s;
        box-shadow: 0 4px 16px rgba(11, 99, 183, 0.25);
      }
      .btn-submit:hover {
        opacity: 0.9;
        transform: translateY(-1px);
      }
      .btn-submit:active {
        transform: translateY(0);
      }

      .form-footer {
        text-align: center;
        margin-top: 14px;
        font-size: 13px;
        color: var(--text-secondary);
      }
      .form-footer a,
      .form-footer button {
        background: none;
        border: none;
        color: var(--blue);
        font-weight: 600;
        cursor: pointer;
        font-size: 13px;
        font-family: inherit;
        padding: 0;
      }
      .form-footer a:hover,
      .form-footer button:hover {
        text-decoration: underline;
      }

      .divider {
        margin-top: 24px;
        padding-top: 18px;
        border-top: 1px solid var(--border-color);
        text-align: center;
      }
      .secure-badge {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        font-size: 11px;
        color: var(--text-secondary);
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }

      @media (max-width: 480px) {
        body {
          align-items: flex-start;
          padding-top: 40px;
        }
        .login-card {
          padding: 28px 22px;
          border-radius: 14px;
        }
        .logo {
          width: 58px;
          height: 58px;
        }
        .brand-text h1 {
          font-size: 19px;
        }
      }
      @media (max-width: 360px) {
        body {
          padding: 12px;
          padding-top: 24px;
        }
        .login-card {
          padding: 22px 16px;
        }
        .brand-text h1 {
          font-size: 17px;
        }
      }
    </style>

    <script>
      (function () {
        const saved = localStorage.getItem("medminds-theme");
        const prefersDark = window.matchMedia(
          "(prefers-color-scheme: dark)",
        ).matches;
        document.documentElement.setAttribute(
          "data-theme",
          saved === "dark" || (!saved && prefersDark) ? "dark" : "light",
        );
      })();

      (async function () {
        try {
          const response = await fetch("/api/user-status", {
            credentials: "include",
          });
          const result = await response.json();
          if (result.user) {
            const redirectUrl =
              result.user.role === "admin" ? "admin-menu.html" : "home.html";
            window.location.href = redirectUrl;
          }
        } catch (e) {
          console.error("Auth check error:", e);
        }
      })();
    </script>
  </head>
  <body>
    <div class="login-card" role="main" aria-labelledby="brand">
      <div class="brand-container">
        <img
          src="WhatsApp Image 2026-01-06 at 10.22.40 AM (1).jpeg"
          alt="MedMinds Logo"
          class="logo"
        />
        <div class="brand-text">
          <h1 id="brand">MedMinds</h1>
          <p>Your future begins here</p>
        </div>
      </div>

      <div id="formAlert" class="alert" role="alert"></div>

      <form
        onsubmit="
          event.preventDefault();
          login();
        "
      >
        <div class="form-group">
          <label for="email">Email</label>
          <input
            type="email"
            id="email"
            placeholder="name@gmail.com"
            required
            autocomplete="email"
            inputmode="email"
          />
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input
            type="password"
            id="password"
            placeholder="••••••••"
            required
            autocomplete="current-password"
          />
        </div>
        <button type="submit" class="btn-submit">Sign In</button>
      </form>

      <div class="form-footer" style="margin-top: 12px">
        <button onclick="window.location.href = 'forgot-password.html'">
          Forgot password?
        </button>
      </div>

      <div class="form-footer">
        Don't have an account?
        <button onclick="window.location.href = 'signup.html'">Sign Up</button>
      </div>

      <div class="divider">
        <span class="secure-badge">
          <svg
            width="13"
            height="13"
            viewBox="0 0 24 24"
            fill="currentColor"
            aria-hidden="true"
          >
            <path
              d="M12 2L4 5v6.09c0 5.05 3.41 9.76 8 10.91 4.59-1.15 8-5.86 8-10.91V5l-8-3zm0 2.18l6 2.25v4.66c0 3.99-2.53 7.74-6 8.71-3.47-.97-6-4.72-6-8.71V6.43l6-2.25z"
            />
          </svg>
          Secure Medical Assessment Portal
        </span>
      </div>
    </div>

    <!-- Password Reset Modal -->
    <div
      id="resetModal"
      style="
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.5);
        z-index: 9999;
        align-items: center;
        justify-content: center;
        padding: 20px;
      "
    >
      <div
        style="
          background: var(--bg-primary);
          border-radius: 18px;
          padding: 36px;
          width: 100%;
          max-width: 420px;
          box-shadow: 0 16px 48px rgba(0, 0, 0, 0.2);
        "
      >
        <h2
          style="
            font-size: 20px;
            font-weight: 700;
            color: var(--blue);
            margin-bottom: 8px;
          "
        >
          🔐 Set New Password
        </h2>
        <p
          style="
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 24px;
          "
        >
          Enter your new password below.
        </p>
        <div
          id="resetModalAlert"
          class="alert"
          style="margin-bottom: 16px"
        ></div>
        <div class="form-group">
          <label for="newPassword">New Password</label>
          <input
            type="password"
            id="newPassword"
            placeholder="••••••••"
            minlength="6"
          />
        </div>
        <div class="form-group">
          <label for="confirmNewPassword">Confirm New Password</label>
          <input
            type="password"
            id="confirmNewPassword"
            placeholder="••••••••"
            minlength="6"
          />
        </div>
        <button
          id="resetPasswordBtn"
          onclick="submitNewPassword()"
          style="
            width: 100%;
            padding: 13px;
            background: linear-gradient(135deg, var(--blue), var(--blue-dark));
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 700;
            font-family: inherit;
            cursor: pointer;
            box-shadow: 0 4px 16px rgba(11, 99, 183, 0.25);
          "
        >
          Update Password
        </button>
      </div>
    </div>

    <script src="script.js"></script>
    <script>
      function showAlert(message, type = "error") {
        const el = document.getElementById("formAlert");
        el.textContent = message;
        el.className = `alert ${type} show`;
        setTimeout(() => el.classList.remove("show"), 5000);
      }
    </script>
  </body>
</html>
