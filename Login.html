<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - MedMinds MDCAT</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="global.css">
<style>

:root {
    --blue-main: #1a73e8;
    --blue-dark: #0b3c91;
    --blue-soft: #e8f1ff;
    --bg: #f6f9ff;
    --text-main: #1f2937;
    --text-muted: #6b7280;
    --radius: 16px;
    --shadow-soft: 0 10px 30px rgba(0,0,0,0.08);
    --shadow-hover: 0 20px 45px rgba(26,115,232,0.25);
}

* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

body {
    margin: 0;
    font-family: 'Segoe UI', system-ui, -apple-system;
    background: radial-gradient(circle at top, #eaf2ff, var(--bg));
    color: var(--text-main);
    line-height: 1.7;
}

/* ===============================
    HEADER
 ============================== */
 header {
     position: sticky;
     top: 0;
     z-index: 1000;
     background: rgba(255,255,255,0.95);
     backdrop-filter: blur(14px);
     padding: 40px 50px;
     display: flex;
     justify-content: space-between;
     align-items: center;
     border-bottom: 1px solid rgba(0,0,0,0.08);
     position: relative; /* allow absolute logo */
 }

 /* ===============================
    LOGO
 ============================== */
 .logo-text {
     display: flex;
     align-items: center;
     gap: 15px;
     position: absolute; /* absolute left alignment */
     left: 50px;
     top: 50%;
     transform: translateY(-50%);
 }

 .logo-text h1 {
     font-size: clamp(1.6rem, 5vw, 1.8rem);
     font-weight: 800;
     background: linear-gradient(135deg, var(--blue-main), var(--blue-dark));
     -webkit-background-clip: text;  /* gradient text */
     -webkit-text-fill-color: transparent;
     background-clip: text;
     color: transparent;
 }

 .logo-text p {
     font-size: 0.75rem;
     color: var(--text-muted);
 }

 /* ===============================
    NAVIGATION
 ============================== */
 header nav {
     position: absolute;
     right: 50px;
     top: 50%;
     transform: translateY(-50%);
 }

 header nav ul {
     list-style: none;
     display: flex;
     gap: 28px;
 }

header nav a {
    text-decoration: none;
    color: var(--text-main);
    font-weight: 600;
    padding: 10px 22px;
    border-radius: 999px;
    transition: all 0.35s ease;
}

header nav a:hover {
    background: linear-gradient(135deg, var(--blue-main), var(--blue-dark));
    color: white;
    box-shadow: var(--shadow-hover);
}

/* HAMBURGER */
.hamburger {
    display: none;
    flex-direction: column;
    cursor: pointer;
}

.hamburger div {
    width: 25px;
    height: 3px;
    background-color: var(--blue-dark);
    margin: 4px 0;
}

/* ===============================
   LOGIN BOX
=============================== */
.container {
    max-width: 600px;
    margin: 60px auto 50px;
    background: linear-gradient(145deg, white, var(--blue-soft));
    padding: 60px;
    border-radius: var(--radius);
    box-shadow: var(--shadow-soft);
    text-align: center;
}

.container p {
    font-size: 18px;
}

.container a {
    font-size: 18px;
}

form {
    display: flex;
    flex-direction: column;
}

h2 {
    font-size: 2rem;
    margin-bottom: 20px;
}

.input-group {
    position: relative;
    margin-bottom: 20px;
}

.input-group i {
    position: absolute;
    left: 16px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-muted);
    pointer-events: none;
}

input, select {
    padding: 16px;
    padding-left: 50px;
    border: 1px solid rgba(0,0,0,0.1);
    border-radius: 8px;
    font-size: 18px;
    transition: border-color 0.3s ease;
    width: 100%;
    box-sizing: border-box;
}

input:focus, select:focus {
    outline: none;
    border-color: var(--blue-main);
    box-shadow: 0 0 0 2px rgba(26,115,232,0.2);
}

button {
    padding: 16px;
    background: linear-gradient(135deg, var(--blue-main), var(--blue-dark));
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-size: 18px;
    font-weight: 600;
    transition: all 0.3s ease;
}

button:hover {
    transform: translateY(-2px);
    box-shadow: var(--shadow-hover);
}

/* ===============================
   FOOTER
=============================== */
footer {
    background: linear-gradient(135deg, var(--blue-dark), var(--blue-main));
    color: white;
    text-align: center;
    padding: 35px 20px;
}

footer a {
    color: white;
    text-decoration: none;
}

/* ===============================
    MOBILE
 ============================== */
@media (max-width: 768px) {
    header {
        padding: 40px;
        flex-direction: column;
        gap: 15px;
    }

    .logo-text {
        position: static;
        transform: none;
        justify-content: center;
        margin-bottom: 10px;
    }

    header nav {
        position: static;
        transform: none;
        right: auto;
        display: none;
        width: 100%;
    }

    header nav.show {
        display: block;
    }

    header nav ul {
        flex-direction: column;
        align-items: center;
    }

    .container {
        margin: 40px auto 50px;
        padding: 40px 30px;
        width: 90%;
    }
}



</style>
</head>

<script>

    function showSignup() {
        document.getElementById('login-form').style.display = 'none';
        document.getElementById('signup-form').style.display = 'block';
    }

    function showLogin() {
        document.getElementById('signup-form').style.display = 'none';
        document.getElementById('login-form').style.display = 'block';
    }

    function toggleNav() {
        document.querySelector('header nav').classList.toggle('show');
    }

    function forgotPassword() {
        const email = document.querySelector('input[name="email"]').value;
        if (!email) {
            alert('Please enter your email first.');
            return;
        }
        fetch('/forgot-password', {
            method: 'POST',
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
            body: new URLSearchParams({ email })
        })
        .then(response => response.text())
        .then(text => alert(text))
        .catch(err => {
            console.error(err);
            alert('An error occurred. Please try again.');
        });
    }

    document.querySelector('form[action="/login"]').addEventListener('submit', function(e) {
        e.preventDefault();
        const formData = new FormData(this);
        const params = new URLSearchParams();
        for (let [key, value] of formData) {
            params.append(key, value);
        }
        // Add returnUrl if present
        const urlParams = new URLSearchParams(window.location.search);
        const returnUrl = urlParams.get('returnUrl');
        if (returnUrl) {
            params.append('returnUrl', returnUrl);
        }
        fetch('/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
            body: params
        })
        .then(response => response.json())
        .then(data => {
            if (data.success) {
                alert(data.message);
                window.location.href = data.redirect;
            } else if (data.error) {
                alert(data.error);
                if (data.error === 'Invalid credentials') {
                    document.getElementById('forgot-link').style.display = 'block';
                }
            }
        })
        .catch(err => console.error(err));
    });

    document.querySelector('form[action="/signup"]').addEventListener('submit', function(e) {
        e.preventDefault();
        const formData = new FormData(this);
        const password = formData.get('password');
        const confirmPassword = formData.get('confirmPassword');
        if (password !== confirmPassword) {
            alert('Passwords do not match');
            return;
        }
        const params = new URLSearchParams();
        for (let [key, value] of formData) {
            params.append(key, value);
        }
        fetch('/signup', {
            method: 'POST',
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
            body: params
        })
        .then(response => response.json())
        .then(data => {
            if (data.success) {
                alert(data.message);
                showLogin();
            } else if (data.error) {
                alert(data.error);
            }
        })
        .catch(err => {
            console.error(err);
            alert('An error occurred during signup. Please try again.');
        });
    });
</script>
